apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
  labels:
    app: flask-app        # ← ServiceMonitor matcehes to select this Service
spec:
  type: NodePort
  selector:
    app: flask-app
  ports:
  - name: http            # ← this is what ServiceMonitor endpoint port refers to
    port: 80
    targetPort: 5000
    nodePort: 31732